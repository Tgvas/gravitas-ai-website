<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Gravitas AI">
  <title>Gravitas AI</title>
  <style>
    .bg           { fill: var(--gravitas-beige, #f5f0e8); }
    .node         { fill: var(--gravitas-navy,  #1a1a2e); }
    .node-primary { fill: var(--gravitas-gold,  #c9a84c); }
    .connector    { stroke: var(--gravitas-navy, #1a1a2e); stroke-width: 1.2; fill: none; }
  </style>

  <!-- Background -->
  <rect id="gf-light-bg" class="bg" width="100" height="100" rx="8"/>

  <!--
    5-node hidden G — light variant for use on light backgrounds.
    Navy nodes and connectors on beige. Gold accent on primary node only. No glow.
    N1 (69, 22)   top of arc
    N2 (25, 50)   left-mid
    N3 (69, 81)   lower-right (bottom of G)
    N4 (75, 50)   right at crossbar height — PRIMARY (gold)
    N5 (50, 50)   crossbar inner point
  -->

  <!-- Connectors -->
  <g id="gf-light-connectors" class="connector">
    <line id="gf-light-l1" x1="69" y1="22" x2="25" y2="50" opacity="0.60"/>
    <line id="gf-light-l2" x1="25" y1="50" x2="69" y2="81" opacity="0.55"/>
    <line id="gf-light-l3" x1="69" y1="81" x2="75" y2="50" opacity="0.60"/>
    <line id="gf-light-l4" x1="75" y1="50" x2="50" y2="50" opacity="0.70"/>
    <line id="gf-light-l5" x1="69" y1="22" x2="50" y2="50" opacity="0.30"/>
  </g>

  <!-- Nodes -->
  <g id="gf-light-nodes">
    <circle id="gf-light-n1" class="node"         cx="69" cy="22" r="4"/>
    <circle id="gf-light-n2" class="node"         cx="25" cy="50" r="4"/>
    <circle id="gf-light-n3" class="node"         cx="69" cy="81" r="4"/>
    <circle id="gf-light-n4" class="node-primary" cx="75" cy="50" r="6"/>
    <circle id="gf-light-n5" class="node"         cx="50" cy="50" r="4"/>
  </g>
</svg>
